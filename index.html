<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Immpression — Art Search Engine &amp; Marketplace</title>
  <meta name="description" content="Immpression is an art search engine and marketplace. Discover and buy original artwork from emerging artists. Artists keep 90% of every sale." />
  <meta name="theme-color" content="#040e2e" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/Logo_T.png" />
  <link rel="apple-touch-icon" href="/Logo_T.png" />

  <!-- Fallback Open Graph (overridden per-page by react-helmet-async) -->
  <meta property="og:site_name" content="Immpression" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Immpression — Art Search Engine &amp; Marketplace" />
  <meta property="og:description" content="Discover and buy original artwork from emerging artists. Art search engine, public domain explorer, and marketplace." />
  <meta property="og:image" content="https://www.immpression.art/Immpression_BannerTemp.png" />
  <meta property="og:url" content="https://www.immpression.art" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@immpression" />

  <!-- Preconnect so the font server handshake happens as early as possible -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!--
    Load the hero font (Permanent Marker) with display=block so the browser
    never shows a fallback — text stays invisible until the font is ready.
    Inter and Bebas Neue use swap (fine for body/UI, flash is less noticeable).
  -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=block" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" />

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-ZHH62YMR2Y"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-ZHH62YMR2Y');
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
